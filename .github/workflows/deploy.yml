name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            cd /opt/evavo-quotation
            git fetch origin main
            git reset --hard origin/main

            cd backend
            source .venv/bin/activate
            pip install -r requirements.txt

            # .env.production is only auto-loaded by systemd (EnvironmentFile=);
            # export it here so manage.py sees the same PG_* settings as the live service.
            set -a
            source .env.production
            set +a

            # Apply any schema changes (idempotent: creates missing tables only)
            python manage.py init-db

            sudo systemctl restart evavo-quotation
            sleep 2
            sudo systemctl is-active --quiet evavo-quotation
